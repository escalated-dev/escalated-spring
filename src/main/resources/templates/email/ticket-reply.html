<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Reply</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: #f8f9fa; border-radius: 8px; padding: 24px; margin-bottom: 20px;">
        <h2 style="color: #1a1a1a; margin: 0 0 8px;">New reply on your ticket</h2>
        <p style="color: #666; margin: 0;">
            Ticket <strong th:text="${ticket.ticketNumber}">ESC-000001</strong> &mdash;
            <span th:text="${ticket.subject}">Subject</span>
        </p>
    </div>

    <div style="background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px;">
        <p style="font-weight: 600; color: #2d3748; margin: 0 0 8px;" th:text="${reply.authorName}">Agent Name</p>
        <div style="color: #4a5568; line-height: 1.6;" th:utext="${reply.body}">Reply body</div>
    </div>

    <div style="margin-top: 24px; text-align: center; color: #a0aec0; font-size: 12px;">
        <p>Powered by Escalated</p>
    </div>
</body>
</html>
