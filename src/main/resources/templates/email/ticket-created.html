<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ticket Created</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: #f8f9fa; border-radius: 8px; padding: 24px; margin-bottom: 20px;">
        <h2 style="color: #1a1a1a; margin: 0 0 8px;">Your ticket has been created</h2>
        <p style="color: #666; margin: 0;">Ticket <strong th:text="${ticket.ticketNumber}">ESC-000001</strong></p>
    </div>

    <div style="background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px;">
        <h3 style="margin: 0 0 12px;" th:text="${ticket.subject}">Subject</h3>
        <div style="color: #4a5568; line-height: 1.6;" th:utext="${ticket.body}">Body</div>
    </div>

    <div style="margin-top: 20px; padding: 16px; background: #edf2f7; border-radius: 8px;">
        <p style="margin: 0; color: #718096; font-size: 14px;">
            You can track your ticket status at any time. A member of our support team will get back to you shortly.
        </p>
    </div>

    <div style="margin-top: 24px; text-align: center; color: #a0aec0; font-size: 12px;">
        <p>Powered by Escalated</p>
    </div>
</body>
</html>
