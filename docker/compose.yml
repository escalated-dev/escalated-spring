name: escalated-spring-demo

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT:-8086}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/escalated
      SPRING_DATASOURCE_USERNAME: escalated
      SPRING_DATASOURCE_PASSWORD: escalated
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: escalated
      POSTGRES_USER: escalated
      POSTGRES_PASSWORD: escalated
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escalated -d escalated"]
      interval: 2s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
